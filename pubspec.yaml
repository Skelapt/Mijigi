name: mijigi
description: "Capture anything. Find everything."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.1

  # Local Storage
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # OCR & ML
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_image_labeling: ^0.14.0

  # Media
  image_picker: ^1.0.7
  photo_manager: ^3.6.0

  # Networking
  http: ^1.6.0

  # PDF & Documents
  syncfusion_flutter_pdf: ^28.1.33

  # File utilities
  mime: ^1.0.6
  crypto: ^3.0.6
  open_file: ^3.5.10

  # Sharing
  share_plus: ^7.2.1

  # Permissions
  permission_handler: ^11.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0

  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
