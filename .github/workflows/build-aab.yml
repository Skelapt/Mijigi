name: Build Flutter AAB - Picxtract

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: stable

      - name: Write local.properties
        run: |
          mkdir -p android
          FLUTTER_SDK=$(dirname "$(dirname "$(which flutter)")")
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/picxtract-release.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=picxtract-release.jks" >> android/key.properties
          ls -lh android/app/picxtract-release.jks

      - name: Verify keystore
        run: |
          keytool -list -keystore android/app/picxtract-release.jks \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            | grep -E "Alias|SHA"

      - name: Precache Flutter engine
        run: flutter precache --android --force

      - name: Flutter pub get
        run: flutter pub get

      - name: Build signed AAB
        run: |
          flutter build appbundle --release --build-number $GITHUB_RUN_NUMBER --no-tree-shake-icons
          ls -lh build/app/outputs/bundle/release/

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: picxtract-release-aab-build-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload mapping file
        uses: actions/upload-artifact@v4
        with:
          name: picxtract-mapping-build-${{ github.run_number }}
          path: build/app/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AAB built successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number:** $GITHUB_RUN_NUMBER" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          AAB_SIZE=$(du -h build/app/outputs/bundle/release/app-release.aab | cut -f1)
          echo "- **AAB Size:** $AAB_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- AAB: \`picxtract-release-aab-build-$GITHUB_RUN_NUMBER\`" >> $GITHUB_STEP_SUMMARY
